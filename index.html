<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAMPRO | Professional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="landing-page" class="max-w-4xl mx-auto pt-20 text-center">
        <h1 class="text-5xl font-black mb-6">SAHAM<span class="text-emerald-500">PRO</span> Premium</h1>
        <p class="text-gray-400 mb-10">Dapatkan akses ke AI Bandarmology, Advanced Screener, dan Fundamental Scorecard.</p>
        
        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <div class="glass p-8 rounded-3xl border border-gray-800 text-left">
                <h3 class="text-xl font-bold text-center">Paket Bulanan</h3>
                <div class="text-4xl font-black my-6 text-white text-center">Rp 30.000</div>
                <button onclick="orderViaWhatsApp('Bulanan', 'Rp 30.000')" class="w-full bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold">Pilih Paket</button>
            </div>
            <div class="glass p-8 rounded-3xl border-2 border-emerald-500 transform md:scale-105 text-left">
                <h3 class="text-xl font-bold text-center">Paket Tahunan</h3>
                <div class="text-4xl font-black my-6 text-white text-center">Rp 100.000</div>
                <button onclick="orderViaWhatsApp('Tahunan', 'Rp 100.000')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-xl font-bold text-black">Pilih Paket</button>
            </div>
        </div>
        <button onclick="enterOwner()" class="text-[10px] text-gray-700 hover:text-emerald-500 uppercase tracking-widest">Admin Access</button>
    </div>

    <div id="premium-dashboard" class="hidden max-w-7xl mx-auto p-4">
        <div class="glass p-6 rounded-2xl mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-black">SAHAMPRO <span class="text-emerald-500">Terminal</span></h2>
            <button onclick="location.reload()" class="text-sm text-red-400 font-bold hover:underline">Logout</button>
        </div>
        
        <div class="glass p-6 rounded-3xl mb-6 h-[600px]">
            <h2 class="text-xl font-black mb-4 text-emerald-400">Advanced Market Screener</h2>
            <div id="tv_screener" class="h-full w-full"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function orderViaWhatsApp(p, h) {
            const pesan = `Halo Admin SAHAMPRO,\n\nSaya ingin berlangganan Paket Premium.\n\n*Detail Order*:\n• Paket: ${p}\n• Harga: ${h}\n\nMohon petunjuk transfer pembayarannya.`;
            window.open(`https://api.whatsapp.com/send?phone=6287832727925&text=${encodeURIComponent(pesan)}`, '_blank');
        }

        function enterOwner() {
            const pass = prompt("Masukkan Password Owner:");
            if(pass === "123456") { // Ganti password di sini
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('premium-dashboard').style.display = 'block';
                new TradingView.widget({ "container_id": "tv_screener", "width": "100%", "height": "100%", "defaultColumn": "overview", "screener_type": "stock_mkt", "displayCurrency": "IDR", "colorTheme": "dark", "market": "indonesia" });
            } else { alert("Password Salah!"); }
        }
    </script>
</body>
</html>
