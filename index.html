<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAMPRO | Professional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-2 md:p-6">

    <nav class="glass rounded-2xl p-4 mb-6 flex justify-between items-center">
        <div class="text-2xl font-black">SAHAM<span class="text-emerald-500">PRO</span> <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded uppercase">Terminal</span></div>
        <div class="text-sm text-gray-400" id="date"></div>
    </nav>

    <div class="h-10 mb-6 overflow-hidden rounded-lg glass">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
            { "symbols": [ { "proName": "IDX:COMPOSITE" }, { "proName": "IDX:BBCA" }, { "proName": "IDX:BBRI" }, { "proName": "IDX:TLKM" }, { "proName": "IDX:ASII" } ], "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true }
            </script>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 h-[550px] glass rounded-3xl p-2">
            <div id="tv_chart" class="h-full w-full"></div>
        </div>

        <div class="h-[550px] glass rounded-3xl p-4 overflow-y-auto">
            <h3 class="font-bold text-emerald-400 mb-4">Market Watch</h3>
            <div id="tv_market"></div>
        </div>

        <div class="lg:col-span-4 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass rounded-3xl p-6 h-[400px]">
                <h3 class="font-bold mb-4">Fundamental Snapshot</h3>
                <div id="tv_fundamental"></div>
            </div>
            <div class="glass rounded-3xl p-6 h-[400px]">
                <h3 class="font-bold mb-4">Market News</h3>
                <div id="tv_news"></div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // Init Chart
        new TradingView.widget({ "container_id": "tv_chart", "symbol": "IDX:BBCA", "theme": "dark", "autosize": true, "interval": "D", "allow_symbol_change": true, "details": true });
        // Init Market
        new TradingView.widget({ "container_id": "tv_market", "width": "100%", "height": "100%", "symbolsGroups": [{"name": "Market", "symbols": [{"name": "IDX:COMPOSITE"}, {"name": "IDX:BBCA"}, {"name": "IDX:BBRI"}, {"name": "IDX:TLKM"}, {"name": "IDX:ASII"}, {"name": "IDX:CUAN"}]}], "colorTheme": "dark", "isTransparent": true });
        // Init Fundamental
        new TradingView.widget({ "container_id": "tv_fundamental", "symbol": "IDX:BBCA", "theme": "dark", "width": "100%", "height": "100%", "isTransparent": true, "displayMode": "regular" });
        // Init News
        new TradingView.widget({ "container_id": "tv_news", "feedMode": "market", "market": "stock", "width": "100%", "height": "100%", "colorTheme": "dark", "isTransparent": true });
        
        document.getElementById('date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
