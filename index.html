
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - Sabar Kaya Clone</title>
    <style>
        @page { size: A4; margin: 15mm; background-color: #0f1a10; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f1a10; color: #fff; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background-color: #1a2a1a; border: 1px solid #2d4a2d; border-radius: 10px; width: 300px; padding: 20px; display: flex; flex-direction: column; }
        h2 { color: #88c088; text-align: center; }
        .price { font-size: 24px; font-weight: bold; text-align: center; margin: 20px 0; color: #e6e6e6; }
        .btn { display: block; text-align: center; background-color: #2d4a2d; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: auto; }
        .btn:hover { background-color: #3e663e; }
        ul { list-style: none; padding: 0; font-size: 14px; }
        li { margin-bottom: 8px; border-bottom: 1px solid #2d4a2d; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Silver -->
        <div class="card">
            <h2>SILVER</h2>

                <li>Top Movers Scanner</li>
                <li>Net Foreign Flow Tracker</li>
                <li>Kalkulator Recovery</li>
            </ul>
            <div class="price">Rp 39K/Bulan</div>
            <a href="https://wa.me/6287832727925?text=Halo, saya ingin beli paket Silver" class="btn">Mulai Sekarang</a>
        </div>
        
        <!-- Gold -->
        <div class="card">
            <h2>GOLD</h2>

                <li>Private Discord Community</li>
                <li>Fitur Insight & Conviction</li>
                <li>Screening Saham (2x/Bulan)</li>
            </ul>
            <div class="price">Rp 549K/6 Bulan</div>
            <a href="https://wa.me/6287832727925?text=Halo, saya ingin beli paket Gold" class="btn">Bergabung Sekarang</a>
        </div>
    </div>
</body>
</html>
