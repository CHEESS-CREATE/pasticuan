<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAHAMPRO | Premium Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4">

    <div id="landing-page" class="max-w-4xl mx-auto pt-20 text-center">
        <h1 class="text-5xl font-black mb-6">SAHAM<span class="text-emerald-500">PRO</span> Premium</h1>
        <p class="text-gray-400 mb-10">Dapatkan akses ke AI Bandarmology, Advanced Screener, dan Fundamental Scorecard.</p>
        
        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-xl font-bold">Bulanan</h3>
                <div class="text-3xl font-black my-4">Rp 30.000</div>
                <button onclick="order('Bulanan', '30.000')" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Beli Paket</button>
            </div>
            <div class="glass p-8 rounded-3xl border border-emerald-500">
                <h3 class="text-xl font-bold">Tahunan</h3>
                <div class="text-3xl font-black my-4">Rp 100.000</div>
                <button onclick="order('Tahunan', '100.000')" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Beli Paket</button>
            </div>
        </div>
        <button onclick="enterOwner()" class="text-[10px] text-gray-700 hover:text-emerald-500">Admin Login</button>
    </div>

    <div id="premium-dashboard" class="hidden max-w-7xl mx-auto p-4">
        <div class="glass p-6 rounded-2xl mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-black">SAHAMPRO <span class="text-emerald-500">Terminal</span></h2>
            <button onclick="location.reload()" class="text-sm text-red-400 font-bold">Logout</button>
        </div>
        
        <div class="glass p-6 rounded-3xl mb-6">
            <h2 class="text-xl font-black mb-4 text-emerald-400">Advanced Screener & Data</h2>
            <div class="tradingview-widget-container" style="height: 400px;">
                <div id="tv_screener" style="height: 100%; width: 100%;"></div>
            </div>
        </div>

        <div id="tv_chart" class="h-[500px] glass rounded-3xl p-2"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function order(p, h) {
            window.open(`https://api.whatsapp.com/send?phone=6287832727925&text=Halo Admin, Saya ingin beli paket ${p} seharga ${h}. Mohon info pembayarannya.`);
        }

        function enterOwner() {
            const pass = prompt("Masukkan Password Owner:");
            if(pass === "123456") { // Ganti password di sini
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('premium-dashboard').style.display = 'block';
                loadWidgets();
            } else { alert("Password Salah!"); }
        }

        function loadWidgets() {
            new TradingView.widget({ "container_id": "tv_screener", "width": "100%", "height": "100%", "defaultColumn": "overview", "screener_type": "stock_mkt", "displayCurrency": "IDR", "colorTheme": "dark", "market": "indonesia" });
            new TradingView.widget({ "container_id": "tv_chart", "symbol": "IDX:BBCA", "theme": "dark", "autosize": true, "details": true });
        }
    </script>
</body>
</html>
